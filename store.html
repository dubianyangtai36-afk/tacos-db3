<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>タコスコ - 店舗詳細</title>
<meta name="description" id="meta-desc" content="全国のタコス専門店を探せるタコスコ。店舗の詳細情報・スコア・レビューをチェック。">
<meta property="og:type" content="website">
<meta property="og:site_name" content="タコスコ">
<meta property="og:title" id="og-title" content="タコスコ - 店舗詳細">
<meta property="og:description" id="og-desc" content="全国のタコス専門店を探せるタコスコ。店舗の詳細情報・スコア・レビューをチェック。">
<meta property="og:url" id="og-url" content="https://tacos-db3.vercel.app/store">
<meta property="og:image" content="https://tacos-db3.vercel.app/og-image.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" id="tw-title" content="タコスコ - 店舗詳細">
<meta name="twitter:description" id="tw-desc" content="全国のタコス専門店を探せるタコスコ。">
<link rel="canonical" id="canonical" href="https://tacos-db3.vercel.app/store">
<script type="application/ld+json" id="jsonld">{}</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Meiryo",sans-serif;font-size:14px;background:#faf9f7;color:#333;line-height:1.6}
a{color:#d35400;text-decoration:none}a:hover{opacity:.8}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);border-bottom:1px solid #e8e4df;backdrop-filter:blur(8px)}
.header-inner{max-width:900px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-size:20px;font-weight:800;color:#d35400;display:flex;align-items:center;gap:6px}
.logo span{font-size:22px}
.header-nav{display:flex;gap:4px}
.nav-item{padding:6px 14px;font-size:12px;font-weight:600;color:#888;border-radius:18px;transition:all .2s;white-space:nowrap}
.nav-item:hover{background:#fef4ed;color:#d35400;text-decoration:none}
.nav-item.active{background:#fef4ed;color:#d35400}

/* Main */
#main{max-width:900px;margin:0 auto;padding:24px 20px 60px}
.breadcrumb{font-size:12px;margin-bottom:16px;color:#aaa}
.breadcrumb a{color:#d35400}
.breadcrumb .sep{margin:0 6px;color:#ddd}

/* Loading & Error */
.loading{display:flex;justify-content:center;align-items:center;height:300px;color:#999;gap:10px}
.spinner{width:28px;height:28px;border:3px solid #f0ebe6;border-top-color:#d35400;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.error h2{font-size:18px;margin-bottom:8px;color:#333}
.error p{margin-bottom:20px;color:#888}

/* Card */
.card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);overflow:hidden}

/* Store Header */
.store-hero{padding:36px 30px;text-align:center;background:linear-gradient(135deg,#d35400 0%,#e67e22 100%);color:#fff}
.store-emoji{font-size:52px;margin-bottom:12px}
.store-name{font-size:26px;font-weight:800;margin-bottom:10px;line-height:1.3}
.meta-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.2);padding:4px 14px;border-radius:16px;font-size:12px;font-weight:600;backdrop-filter:blur(4px)}

/* Store Body */
.store-body{padding:28px}
.section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #f0ebe6}
.section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.section-title{font-size:11px;color:#d35400;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* Ratings */
.rating-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;text-align:center}
.rating-box{padding:16px;background:#faf9f7;border-radius:12px}
.rating-num{font-size:32px;font-weight:800;color:#d35400}
.rating-stars{font-size:13px;margin:2px 0;color:#e67e22}
.rating-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* Tags */
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:5px 12px;background:#fef4ed;color:#d35400;border:1px solid #f5d5b8;border-radius:16px;font-size:12px;font-weight:600}

/* Description */
.desc{font-size:14px;color:#666;line-height:1.9}

/* Info Grid */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.info-box{padding:14px;background:#faf9f7;border-radius:10px}
.info-box .label{font-size:11px;color:#d35400;font-weight:700;margin-bottom:3px}
.info-box .value{font-size:14px;color:#333}
.maps-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#d35400;color:#fff;border-radius:8px;font-size:13px;font-weight:700;margin-top:14px;transition:background .2s}
.maps-btn:hover{background:#b84500;text-decoration:none;color:#fff}

/* Nearby */
.nearby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.nearby-card{padding:16px;background:#faf9f7;border-radius:10px;border:1px solid #f0ebe6;transition:all .2s;display:block;color:inherit}
.nearby-card:hover{border-color:#d35400;background:#fef4ed;text-decoration:none}
.nearby-emoji{font-size:24px;margin-bottom:6px}
.nearby-name{font-size:13px;font-weight:700;color:#333;margin-bottom:2px}
.nearby-meta{font-size:11px;color:#aaa}

/* Actions */
.actions{display:flex;gap:10px;flex-wrap:wrap;padding-top:16px}
.action-btn{flex:1;min-width:140px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.action-btn:hover{text-decoration:none;opacity:.9}
.action-btn.back{background:#faf9f7;color:#d35400;border:1px solid #f0ebe6}
.action-btn.map{background:#d35400;color:#fff}
.action-btn.share{background:#1da1f2;color:#fff}

/* Responsive */
@media(max-width:640px){
  .header-inner{padding:8px 14px}
  .logo{font-size:17px}
  .header-nav{gap:0}
  .nav-item{padding:5px 8px;font-size:11px}
  #main{padding:16px 12px 40px}
  .store-hero{padding:28px 18px}
  .store-name{font-size:20px}
  .store-emoji{font-size:40px}
  .store-body{padding:20px 16px}
  .info-grid{grid-template-columns:1fr}
  .rating-row{grid-template-columns:1fr 1fr}
  .nearby-grid{grid-template-columns:1fr 1fr}
  .actions{flex-direction:column}
}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a class="logo" href="/"><span>🌮</span> タコスコ</a>
    <nav class="header-nav">
      <a href="/" class="nav-item">検索</a>
      <a href="/map" class="nav-item">マップ</a>
      <a href="/" class="nav-item">一覧</a>
    </nav>
  </div>
</header>

<main id="main">
  <div class="breadcrumb">
    <a href="/">タコスコ</a><span class="sep">›</span>
    <span id="bc-area">地域</span><span class="sep">›</span>
    <span id="bc-name">店舗名</span>
  </div>

  <div id="loading" class="loading" style="display:none">
    <div class="spinner"></div><span>読み込み中...</span>
  </div>
  <div id="error" class="error" style="display:none">
    <h2>店舗が見つかりません</h2>
    <p id="error-msg">指定された店舗の情報が見つかりませんでした。</p>
    <a href="/" class="maps-btn">← 一覧に戻る</a>
  </div>

  <div id="content" class="card" style="display:none">
    <div class="store-hero">
      <div class="store-emoji" id="s-emoji">🌮</div>
      <h1 class="store-name" id="s-name">店舗名</h1>
      <div class="meta-row">
        <div class="badge" id="s-area">東京</div>
        <div class="badge" id="s-hood">渋谷区</div>
        <div class="badge" id="s-style">本格メキシコ</div>
      </div>
    </div>
    <div class="store-body">
      <div class="section">
        <div class="rating-row">
          <div class="rating-box">
            <div class="rating-label">スコア</div>
            <div class="rating-num" id="s-score">-</div>
            <div class="rating-stars" id="s-stars">☆☆☆☆☆</div>
            <div style="font-size:11px;color:#aaa;margin-top:2px" id="s-reviews">0件のレビュー</div>
          </div>
          <div class="rating-box" id="s-tabelog-box" style="display:none">
            <div class="rating-label">食べログ</div>
            <div class="rating-num" id="s-tabelog" style="font-size:24px">3.50</div>
          </div>
          <div class="rating-box">
            <div class="rating-label">価格帯</div>
            <div class="rating-num" id="s-price" style="font-size:22px">-</div>
          </div>
        </div>
      </div>

      <div class="section" id="sec-tags" style="display:none">
        <div class="section-title">特徴タグ</div>
        <div class="tags" id="s-tags"></div>
      </div>

      <div class="section" id="sec-desc" style="display:none">
        <div class="section-title">店舗紹介</div>
        <div class="desc" id="s-desc"></div>
      </div>

      <div class="section" id="sec-info">
        <div class="section-title">店舗情報</div>
        <div class="info-grid">
          <div class="info-box">
            <div class="label">住所</div>
            <div class="value" id="s-addr">-</div>
          </div>
          <div class="info-box">
            <div class="label">営業時間</div>
            <div class="value" id="s-hours">-</div>
          </div>
          <div class="info-box">
            <div class="label">定休日</div>
            <div class="value" id="s-closed">-</div>
          </div>
        </div>
        <a id="s-map-btn" class="maps-btn" href="#" target="_blank" rel="noopener">📍 Google Mapsで見る</a>
      </div>

      <div class="section" id="sec-nearby" style="display:none">
        <div class="section-title">近くのタコス店</div>
        <div class="nearby-grid" id="s-nearby"></div>
      </div>

      <div class="actions">
        <a href="/" class="action-btn back">← 一覧に戻る</a>
        <a id="s-map-link" class="action-btn map" href="#" target="_blank" rel="noopener">📍 Google Mapsで開く</a>
        <a id="s-share" class="action-btn share" href="#" target="_blank" rel="noopener">🐦 Xでシェア</a>
      </div>
    </div>
  </div>
</main>

<script>window.stores=[];</script>
<script src="/stores-extra.js"></script>
<script src="/stores-extra2.js"></script>
<script src="/stores-extra3.js"></script>
<script src="/stores-extra4.js"></script>
<script src="/stores-extra5.js"></script>
<script src="/stores-extra6.js"></script>
<script src="/stores-extra7.js"></script>
<script src="/stores-extra8.js"></script>
<script src="/stores-extra9.js"></script>
<script src="/stores-fixes.js"></script>
<script src="/stores-fixes2.js"></script>
<script>
(function(){
  var params=new URLSearchParams(window.location.search);
  var storeId=parseInt(params.get('id'));
  if(!storeId){document.getElementById('error').style.display='';return;}
  document.getElementById('loading').style.display='';

  fetch('/stores-meta.json').then(function(r){return r.json()}).then(function(meta){
    window._meta=meta;
    Object.keys(meta).forEach(function(idStr){
      var id=parseInt(idStr);
      var exists=window.stores.some(function(s){return s.id===id});
      if(!exists){
        var m=meta[idStr];
        window.stores.push({id:id,name:m[0],area:m[1],neighborhood:m[2],real:true,style:'',price:'',score:0,reviews:0,emoji:'🌮',tags:[],desc:'',address:'',hours:'',closed:''});
      }
    });
  }).catch(function(){}).finally(function(){
    var attempts=0,maxAttempts=20;
    function tryFind(){
      var store=window.stores.find(function(s){return s.id===storeId});
      if(store){renderStore(store)}
      else if(attempts<maxAttempts){attempts++;setTimeout(tryFind,100)}
      else{document.getElementById('loading').style.display='none';document.getElementById('error').style.display=''}
    }
    tryFind();
  });

  function stars(score){
    var s=score/20;var full=Math.floor(s);var half=s-full>=0.5?1:0;var empty=5-full-half;
    return '★'.repeat(full)+(half?'☆':'')+('☆'.repeat(empty));
  }

  function renderStore(s){
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='';
    document.title='タコスコ - '+s.name;
    document.getElementById('bc-area').textContent=s.area||'全国';
    document.getElementById('bc-name').textContent=s.name;
    document.getElementById('s-emoji').textContent=s.emoji||'🌮';
    document.getElementById('s-name').textContent=s.name;
    document.getElementById('s-area').textContent=s.area||'';
    document.getElementById('s-hood').textContent=s.neighborhood||'';
    document.getElementById('s-style').textContent=s.style||'タコス';
    document.getElementById('s-score').textContent=s.score||'-';
    document.getElementById('s-stars').textContent=stars(s.score||0);
    document.getElementById('s-reviews').textContent=(s.reviews||0)+'件のレビュー';
    document.getElementById('s-price').textContent=s.price||'-';
    if(s.tabelogScore){
      document.getElementById('s-tabelog-box').style.display='';
      document.getElementById('s-tabelog').textContent=s.tabelogScore.toFixed(2);
    }
    if(s.tags&&s.tags.length){
      document.getElementById('sec-tags').style.display='';
      document.getElementById('s-tags').innerHTML=s.tags.map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
    }
    if(s.desc){
      document.getElementById('sec-desc').style.display='';
      document.getElementById('s-desc').textContent=s.desc;
    }
    document.getElementById('s-addr').textContent=s.address||'-';
    document.getElementById('s-hours').textContent=s.hours||'-';
    document.getElementById('s-closed').textContent=s.closed||'-';
    var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.address||s.name);
    document.getElementById('s-map-btn').href=mapsUrl;
    document.getElementById('s-map-link').href=mapsUrl;
    var tweetText=encodeURIComponent('🌮 '+s.name+'｜タコスコ');
    var tweetUrl=encodeURIComponent(window.location.href);
    document.getElementById('s-share').href='https://twitter.com/intent/tweet?text='+tweetText+'&url='+tweetUrl;
    var nearby=window.stores.filter(function(ns){return ns.id!==s.id&&ns.area===s.area}).slice(0,6);
    if(nearby.length){
      document.getElementById('sec-nearby').style.display='';
      document.getElementById('s-nearby').innerHTML=nearby.map(function(ns){
        return '<a class="nearby-card" href="/store?id='+ns.id+'"><div class="nearby-emoji">'+(ns.emoji||'🌮')+'</div><div class="nearby-name">'+ns.name+'</div><div class="nearby-meta">'+(ns.neighborhood||ns.area)+'</div></a>';
      }).join('');
    }

    // SEO: Update OGP meta tags
    var pageUrl='https://tacos-db3.vercel.app/store?id='+s.id;
    var ogTitle='🌮 '+s.name+' - タコスコ';
    var ogDesc=s.name+'（'+(s.area||'')+(s.neighborhood?' '+s.neighborhood:'')+'）'+(s.style?'の'+s.style:'')+'。'+(s.score?'スコア'+s.score+'点。':'')+'タコスコで全国のタコス店を探そう。';
    document.getElementById('meta-desc').setAttribute('content',ogDesc);
    document.getElementById('og-title').setAttribute('content',ogTitle);
    document.getElementById('og-desc').setAttribute('content',ogDesc);
    document.getElementById('og-url').setAttribute('content',pageUrl);
    document.getElementById('tw-title').setAttribute('content',ogTitle);
    document.getElementById('tw-desc').setAttribute('content',ogDesc);
    document.getElementById('canonical').setAttribute('href',pageUrl);

    // SEO: JSON-LD Restaurant structured data
    var ld={
      '@context':'https://schema.org',
      '@type':'Restaurant',
      name:s.name,
      servesCuisine:'Mexican',
      address:{'@type':'PostalAddress',addressLocality:s.area||'',streetAddress:s.address||''},
      url:pageUrl
    };
    if(s.score&&s.score>0) ld.aggregateRating={'@type':'AggregateRating',ratingValue:(s.score/20).toFixed(1),bestRating:'5',ratingCount:String(s.reviews||1)};
    if(s.hours) ld.openingHours=s.hours;
    if(s.price) ld.priceRange=s.price;
    document.getElementById('jsonld').textContent=JSON.stringify(ld);
  }
})();
</script>
</body>
</html>
