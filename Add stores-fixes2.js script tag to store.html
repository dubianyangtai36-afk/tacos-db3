<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>タコスコ - 店舗詳細</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;font-size:14px;background:#f5f5f5;color:#333;line-height:1.6}
a{color:#0d7377;text-decoration:none}a:hover{opacity:.8;text-decoration:underline}
#header{background:#0d7377;padding:12px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
#header-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:20px}
#logo{font-size:24px;font-weight:900;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
#logo:hover{text-decoration:none;opacity:.9}
.header-text{display:flex;flex-direction:column;gap:2px}
.header-title{font-size:20px;font-weight:900;color:#fff}
.header-subtitle{font-size:11px;color:#f0faf9}
#header-nav{display:flex;gap:0;margin-left:auto}
.nav-item{padding:8px 16px;color:#f0faf9;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;border-right:1px solid rgba(255,255,255,.2);white-space:nowrap;cursor:pointer}
.nav-item:first-child{border-left:1px solid rgba(255,255,255,.2)}
.nav-item:hover{background:rgba(255,255,255,.15);text-decoration:none;color:#fff}
#main{max-width:900px;margin:0 auto;padding:30px 20px}
.breadcrumb{font-size:12px;margin-bottom:20px;color:#888}
.breadcrumb a{color:#0d7377}
.loading{display:flex;justify-content:center;align-items:center;height:400px;font-size:16px;color:#666}
.spinner{display:inline-block;width:40px;height:40px;border:4px solid #f0faf9;border-top-color:#0d7377;border-radius:50%;animation:spin 1s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:30px;text-align:center;color:#856404}
.error h2{font-size:20px;margin-bottom:10px}
.error p{margin-bottom:20px}
.back-btn{display:inline-block;padding:10px 20px;background:#0d7377;color:#fff;border-radius:4px;font-weight:600}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.store-hdr{background:linear-gradient(135deg,#0d7377 0%,#14919b 100%);padding:40px 30px;text-align:center;color:#fff}
.store-emoji{font-size:64px;line-height:1;margin-bottom:15px}
.store-name{font-size:32px;font-weight:900;margin-bottom:10px}
.meta-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;font-size:13px;margin-bottom:15px}
.badge{background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px}
.store-body{padding:30px}
.section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f0faf9}
.section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.section-title{font-size:12px;color:#0d7377;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.info-box .label{font-size:12px;color:#0d7377;font-weight:700;margin-bottom:4px}
.info-box .value{font-size:15px;color:#333;line-height:1.6}
.tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{display:inline-block;padding:6px 14px;background:#f0faf9;color:#0d7377;border:1px solid #d0e8eb;border-radius:20px;font-size:12px;font-weight:600}
.desc{font-size:15px;color:#555;line-height:1.8}
.rating-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;text-align:center}
.rating-num{font-size:36px;font-weight:900;color:#0d7377}
.rating-stars{font-size:14px;margin:4px 0}
.rating-label{font-size:11px;color:#888;text-transform:uppercase}
.maps-btn{display:inline-block;padding:10px 20px;background:#0d7377;color:#fff;border-radius:6px;font-size:13px;font-weight:700;margin-top:12px}
.maps-btn:hover{background:#095d64;text-decoration:none}
.nearby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.nearby-card{padding:16px;background:#f9fafa;border-radius:8px;border:1px solid #eee;cursor:pointer;text-decoration:none;color:inherit;transition:all .2s}
.nearby-card:hover{border-color:#0d7377;background:#f0faf9;text-decoration:none}
.nearby-emoji{font-size:28px;margin-bottom:8px}
.nearby-name{font-size:13px;font-weight:700;color:#333;margin-bottom:4px}
.nearby-meta{font-size:11px;color:#888}
.actions{display:flex;gap:12px;flex-wrap:wrap;padding-top:20px}
.action-btn{flex:1;min-width:150px;padding:14px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.action-btn.back{background:#f0faf9;color:#0d7377;border:1px solid #d0e8eb}
.action-btn.map{background:#0d7377;color:#fff}
.action-btn.share{background:#1da1f2;color:#fff}
.action-btn:hover{opacity:.9;text-decoration:none}
@media(max-width:768px){
#header-inner{flex-direction:column;gap:12px}
#logo{font-size:20px}.header-title{font-size:18px}
#header-nav{width:100%;margin-left:0}
.nav-item{flex:1;justify-content:center;padding:6px 8px;font-size:11px}
#main{padding:20px 12px}
.store-hdr{padding:30px 20px}
.store-name{font-size:24px}.store-emoji{font-size:48px}
.store-body{padding:20px}
.info-grid{grid-template-columns:1fr}
.rating-row{grid-template-columns:1fr}
.nearby-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.actions{flex-direction:column}
}
</style>
</head>
<body>
<header id="header">
<div id="header-inner">
<div style="display:flex;align-items:center;gap:20px;flex:1">
<a id="logo" href="/">🌮 タコスコ</a>
<div class="header-text"><div class="header-title">タコスコ</div><div class="header-subtitle">日本中のタコスに出会えるサイト</div></div>
</div>
<nav id="header-nav">
<a href="/" class="nav-item">🔍 検索</a>
<a href="/" class="nav-item">🏆 ランキング</a>
<a href="/map" class="nav-item">🗺️ 全国マップ</a>
<a href="/" class="nav-item">❤️ お気に入り</a>
</nav>
</div>
</header>
<main id="main">
<div class="breadcrumb"><a href="/">タコスコ</a> <span style="margin:0 6px;color:#ccc">&gt;</span> <span id="bc-area">地域</span> <span style="margin:0 6px;color:#ccc">&gt;</span> <span id="bc-name">店舗名</span></div>
<div id="loading" class="loading" style="display:none"><div class="spinner"></div><span>読み込み中...</span></div>
<div id="error" class="error" style="display:none"><h2>店舗が見つかりません</h2><p id="error-msg">指定された店舗の情報が見つかりませんでした。</p><a href="/" class="back-btn">← 一覧に戻る</a></div>
<div id="content" class="card" style="display:none">
<div class="store-hdr"><div class="store-emoji" id="s-emoji">🌮</div><h1 class="store-name" id="s-name">店舗名</h1><div class="meta-row"><div class="badge" id="s-area">東京</div><div class="badge" id="s-hood">渋谷区</div><div class="badge" id="s-style">本格メキシコ</div></div></div>
<div class="store-body">
<div class="section"><div class="rating-row"><div><div class="rating-label">スコア</div><div class="rating-num" id="s-score">90</div><div class="rating-stars" id="s-stars">★★★★★</div><div style="font-size:12px;color:#888" id="s-reviews">100件のレビュー</div></div><div id="s-tabelog-box" style="display:none"><div class="rating-label">食べログ</div><div class="rating-num" id="s-tabelog" style="font-size:24px">3.50</div></div><div><div class="rating-label">価格帯</div><div class="rating-num" id="s-price" style="font-size:28px">¥¥</div></div></div></div>
<div class="section" id="sec-tags" style="display:none"><div class="section-title">特徴タグ</div><div class="tags" id="s-tags"></div></div>
<div class="section" id="sec-desc" style="display:none"><div class="section-title">店舗紹介</div><div class="desc" id="s-desc"></div></div>
<div class="section" id="sec-info"><div class="section-title">店舗情報</div><div class="info-grid"><div class="info-box"><div class="label">住所</div><div class="value" id="s-addr">-</div></div><div class="info-box"><div class="label">営業時間</div><div class="value" id="s-hours">-</div></div><div class="info-box"><div class="label">定休日</div><div class="value" id="s-closed">-</div></div></div><a id="s-map-btn" class="maps-btn" href="#" target="_blank" rel="noopener">📍 Google Mapsで見る</a></div>
<div class="section" id="sec-nearby" style="display:none"><div class="section-title">近くのタコス店</div><div class="nearby-grid" id="s-nearby"></div></div>
<div class="actions"><a href="/" class="action-btn back">← 一覧に戻る</a><a id="s-map-link" class="action-btn map" href="#" target="_blank" rel="noopener">📍 Google Mapsで開く</a><a id="s-share" class="action-btn share" href="#" target="_blank" rel="noopener">🐦 Twitterでシェア</a></div>
</div>
</div>
</main>
<script>
window.stores=[];
</script>
<script src="/stores-extra.js"></script>
<script src="/stores-extra2.js"></script>
<script src="/stores-extra3.js"></script>
<script src="/stores-extra4.js"></script>
<script src="/stores-extra5.js"></script>
<script src="/stores-extra6.js"></script>
<script src="/stores-extra7.js"></script>
<script src="/stores-extra8.js"></script>
<script src="/stores-fixes.js"></script>
<script src="/stores-fixes2.js"></script>
<script>
(function(){
var params=new URLSearchParams(window.location.search);
var storeId=parseInt(params.get('id'));
if(!storeId){document.getElementById('error').style.display='';return;}
document.getElementById('loading').style.display='';
fetch('/stores-meta.json').then(function(r){return r.json()}).then(function(meta){
window._meta=meta;
Object.keys(meta).forEach(function(idStr){
var id=parseInt(idStr);
var exists=window.stores.some(function(s){return s.id===id});
if(!exists){
var m=meta[idStr];
window.stores.push({id:id,name:m[0],area:m[1],neighborhood:m[2],real:true,style:'',price:'',score:0,reviews:0,emoji:'🌮',tags:[],desc:'',address:'',hours:'',closed:''});
}
});
}).catch(function(){}).finally(function(){
var attempts=0;
var maxAttempts=20;
function tryFind(){
var store=window.stores.find(function(s){return s.id===storeId});
if(store){
renderStore(store);
}else if(attempts<maxAttempts){
attempts++;
setTimeout(tryFind,100);
}else{
document.getElementById('loading').style.display='none';
document.getElementById('error').style.display='';
}
}
tryFind();
});
function stars(score){
var s=score/20;
var full=Math.floor(s);
var half=s-full>=0.5?1:0;
var empty=5-full-half;
return '★'.repeat(full)+(half?'☆':'')+('☆'.repeat(empty));
}
function renderStore(s){
document.getElementById('loading').style.display='none';
document.getElementById('content').style.display='';
document.title='タコスコ - '+s.name;
document.getElementById('bc-area').textContent=s.area||'全国';
document.getElementById('bc-name').textContent=s.name;
document.getElementById('s-emoji').textContent=s.emoji||'🌮';
document.getElementById('s-name').textContent=s.name;
document.getElementById('s-area').textContent=s.area||'';
document.getElementById('s-hood').textContent=s.neighborhood||'';
document.getElementById('s-style').textContent=s.style||'タコス';
document.getElementById('s-score').textContent=s.score||'-';
document.getElementById('s-stars').textContent=stars(s.score||0);
document.getElementById('s-reviews').textContent=(s.reviews||0)+'件のレビュー';
document.getElementById('s-price').textContent=s.price||'-';
if(s.tabelogScore){
document.getElementById('s-tabelog-box').style.display='';
document.getElementById('s-tabelog').textContent=s.tabelogScore.toFixed(2);
}
if(s.tags&&s.tags.length){
document.getElementById('sec-tags').style.display='';
document.getElementById('s-tags').innerHTML=s.tags.map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
}
if(s.desc){
document.getElementById('sec-desc').style.display='';
document.getElementById('s-desc').textContent=s.desc;
}
document.getElementById('s-addr').textContent=s.address||'-';
document.getElementById('s-hours').textContent=s.hours||'-';
document.getElementById('s-closed').textContent=s.closed||'-';
var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.address||s.name);
document.getElementById('s-map-btn').href=mapsUrl;
document.getElementById('s-map-link').href=mapsUrl;
var tweetText=encodeURIComponent(s.emoji+' '+s.name+'｜タコスコ');
var tweetUrl=encodeURIComponent(window.location.href);
document.getElementById('s-share').href='https://twitter.com/intent/tweet?text='+tweetText+'&url='+tweetUrl;
var nearby=window.stores.filter(function(ns){return ns.id!==s.id&&ns.area===s.area}).slice(0,6);
if(nearby.length){
document.getElementById('sec-nearby').style.display='';
document.getElementById('s-nearby').innerHTML=nearby.map(function(ns){
return '<a class="nearby-card" href="/store?id='+ns.id+'"><div class="nearby-emoji">'+(ns.emoji||'🌮')+'</div><div class="nearby-name">'+ns.name+'</div><div class="nearby-meta">'+(ns.neighborhood||ns.area)+'</div></a>';
}).join('');
}
}
})();
</script>
</body>
</html>
