function getCoords(store) {
  var nb = store.neighborhood;
  if (NB_COORDS[nb]) return NB_COORDS[nb];
  var area = store.area;
  var base = AREA_COORDS[area] || [36.2, 138.2];
  var hash = 0;
  for (var i = 0; i < nb.length; i++) hash = ((hash << 5) - hash) + nb.charCodeAt(i);
  var r1 = ((hash & 0xFF) / 255 - 0.5) * 0.08;
  var r2 = (((hash >> 8) & 0xFF) / 255 - 0.5) * 0.08;
  return [base[0] + r1, base[1] + r2];
}

function getScoreColor(sc) {
  var five = sc / 20;
  if (five >= 4.5) return "#e8a000";
  if (five >= 4.0) return "#0d7377";
  if (five >= 3.5) return "#4a9";
  if (five >= 3.0) return "#888";
  return "#c66";
}

function getScoreLabel(sc) {
  var five = sc / 20;
  if (five >= 4.5) return "殿堂入り";
  if (five >= 4.0) return "超おすすめ";
  if (five >= 3.5) return "おすすめ";
  if (five >= 3.0) return "普通";
  return "要改善";
}

    function slugify(name) {
      return encodeURIComponent(name.replace(/[\s（）()\u30FB/／]+/g, "-").replace(/^-|-$/g, "").toLowerCase());
    }

function initMap() {
  var map = L.map("map", {zoomControl:true}).setView([36.5, 137.5], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 18
  }).addTo(map);

  var markers = L.markerClusterGroup ? L.markerClusterGroup() : L.layerGroup();
  var allStores = (window.stores || []).concat(INLINE_STORES);
  var pinCount = 0;

  var markerMap = {};
  allStores.forEach(function(s) {
    var coords = getCoords(s);
    var sc = s.score || 70;
    var five = (sc / 20).toFixed(1);
    var color = getScoreColor(sc);
    var label = getScoreLabel(sc);

    var icon = L.divIcon({
      className: "custom-pin",
      html: '<div style="background:' + color + ';width:28px;height:28px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;">' + "🌮" + '</div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });

    var popup = '<div class="store-popup">'
      + '<h3>' + '🌮 ' + s.name + '</h3>'
      + '<div class="area">📍 ' + s.neighborhood + '</div>'
      + '<div class="tags">' + s.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join("") + '</div>'
      + '<div><span class="score" style="color:' + color + ';">' + five + '</span> <span style="color:'+color+';font-size:12px;">' + label + '</span></div>'
      + '<div style="margin-top:6px;font-size:11px;color:#999;">' + (s.address||"") + '</div>'
      
        + '<a href="/?shop=' + slugify(s.name) + '" style="display:block;margin-top:8px;padding:6px 0;text-align:center;background:#0d7377;color:#fff;border-radius:6px;text-decoration:none;font-size:12px;font-weight:bold;">詳細を見る →</a>'
        + '</div>';

    var marker = L.marker(coords, {icon: icon}).bindPopup(popup);
    markers.addLayer(marker);
      markerMap[slugify(s.name)] = marker;
          _allMarkerData.push({id:s.id, marker:marker});
    pinCount++;
  });

  map.addLayer(markers);

  // Auto-open popup from URL parameter
  (function() {
    var params = new URLSearchParams(window.location.search);
    var shopSlug = params.get("shop");
    if (shopSlug) {
      var key = encodeURIComponent(shopSlug);
      var m = markerMap[key] || markerMap[shopSlug];
      if (!m) {
        var mmKeys = Object.keys(markerMap);
        for (var i = 0; i < mmKeys.length; i++) {
          if (key.indexOf(mmKeys[i]) === 0 || mmKeys[i].indexOf(key) === 0) {
            m = markerMap[mmKeys[i]];
            break;
          }
        }
      }
      if (m) {
        map.setView(m.getLatLng(), 16);
        setTimeout(function() { m.openPopup(); }, 500);
      }
    }
  })();
  document.getElementById("pin-count").textContent = pinCount + "店舗";
}

  setTimeout(initMap, 500);

});

    function getFavs(){try{return JSON.parse(localStorage.getItem("tacos_favs")||"[]")}catch(e){return[]}}
    var _allMarkerData=[];
    var _favFilterOn=false;
    function toggleFavFilter(){
      _favFilterOn=!_favFilterOn;
      var btn=document.getElementById("favToggle");
      if(_favFilterOn){
        btn.style.background="#e74c3c";btn.style.color="#fff";
        btn.textContent="\u2665 \u304a\u6c17\u306b\u5165\u308a\u8868\u793a\u4e2d";
      }else{
        btn.style.background="#fff";btn.style.color="#e74c3c";
        btn.textContent="\u2665 \u304a\u6c17\u306b\u5165\u308a\u306e\u307f";
      }
      applyFavFilter();
    }
    function applyFavFilter(){
      var favs=getFavs();
      _allMarkerData.forEach(function(d){
        var el=d.marker.getElement();
        if(!el)return;
        var badge=el.querySelector(".fav-heart-badge");
        if(favs.indexOf(d.id)!==-1){
          if(!badge){badge=document.createElement("div");badge.className="fav-heart-badge";badge.textContent="\u2665";el.appendChild(badge);}
          d.marker.setOpacity(1);
        }else{
          if(badge)badge.remove();
          if(_favFilterOn)d.marker.setOpacity(0.15);
          else d.marker.setOpacity(1);
        }
      });
    }
