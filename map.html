<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>タコスコ - 全国マップ</title>
<meta name="description" content="全国のタコス専門店をマップで探せるタコスコ">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#fff}
#map{width:100%;height:100vh}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:rgba(255,255,255,.95);border-bottom:1px solid #e0e0e0;backdrop-filter:blur(6px)}
.top-bar .logo{font-size:18px;font-weight:700;color:#d35400;white-space:nowrap}
.top-bar .logo span{font-size:20px}
.top-bar input{flex:1;max-width:320px;padding:8px 12px;border:1px solid #ccc;border-radius:20px;
  font-size:14px;outline:none}
.top-bar input:focus{border-color:#d35400}
.top-bar .count{font-size:13px;color:#888;white-space:nowrap}
.top-bar .home-link{text-decoration:none;color:#d35400;font-size:13px;white-space:nowrap}
.popup-name{font-weight:700;font-size:15px;margin-bottom:4px;color:#333}
.popup-area{font-size:12px;color:#888;margin-bottom:4px}
.popup-addr{font-size:12px;color:#555;margin-bottom:4px}
.popup-hours{font-size:11px;color:#888;margin-bottom:6px}
.popup-score{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
.popup-link{display:inline-block;margin-left:6px;font-size:12px;color:#d35400;text-decoration:none}
.leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.leaflet-popup-content{margin:12px 14px;line-height:1.5}
@media(max-width:600px){
  .top-bar{padding:8px 10px;gap:8px}
  .top-bar .logo{font-size:15px}
  .top-bar input{padding:6px 10px;font-size:13px}
  .top-bar .count{font-size:11px}
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo"><span>🌮</span> タコスコ</div>
  <input id="search" type="text" placeholder="店名・エリアで検索...">
  <div class="count" id="storeCount"></div>
  <a href="/" class="home-link">← 一覧</a>
</div>
<div id="map"></div>

<script src="/stores.js"></script>
<script src="/stores-extra.js"></script>
<script src="/stores-extra2.js"></script>
<script src="/stores-extra3.js"></script>
<script src="/stores-extra4.js"></script>
<script src="/stores-extra5.js"></script>
<script src="/stores-extra6.js"></script>
<script src="/stores-extra7.js"></script>
<script src="/stores-extra8.js"></script>
<script src="/stores-extra9.js"></script>
<script src="/stores-fixes.js"></script>
<script src="/stores-fixes2.js"></script>
<script src="/store-coords.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  // --- Prefecture coords ---
  var prefCoords={
    "北海道":[43.06,141.35],"青森":[40.82,140.74],"岩手":[39.70,141.15],
    "宮城":[38.27,140.87],"秋田":[39.72,140.10],"山形":[38.24,140.33],
    "福島":[37.75,140.47],"茨城":[36.34,140.45],"栃木":[36.57,139.88],
    "群馬":[36.39,139.06],"埼玉":[35.86,139.65],"千葉":[35.61,140.12],
    "東京":[35.68,139.69],"神奈川":[35.45,139.64],"新潟":[37.90,139.02],
    "富山":[36.70,137.21],"石川":[36.59,136.63],"福井":[36.07,136.22],
    "山梨":[35.66,138.57],"長野":[36.23,138.18],"岐阜":[35.39,136.72],
    "静岡":[34.98,138.38],"愛知":[35.18,136.91],"三重":[34.73,136.51],
    "滋賀":[35.00,135.87],"京都":[35.02,135.77],"大阪":[34.69,135.50],
    "兵庫":[34.69,135.18],"奈良":[34.69,135.83],"和歌山":[34.23,135.17],
    "鳥取":[35.50,134.24],"島根":[35.47,133.05],"岡山":[34.66,133.93],
    "広島":[34.40,132.46],"山口":[34.19,131.47],"徳島":[34.07,134.56],
    "香川":[34.34,134.04],"愛媛":[33.84,132.77],"高知":[33.56,133.53],
    "福岡":[33.61,130.42],"佐賀":[33.25,130.30],"長崎":[32.74,129.87],
    "熊本":[32.79,130.74],"大分":[33.24,131.61],"宮崎":[31.91,131.42],
    "鹿児島":[31.56,130.56],"沖縄":[26.34,127.80]
  };
  var areaAlias={
    "名古屋":"愛知","横浜":"神奈川","川崎":"神奈川","鎌倉":"神奈川",
    "札幌":"北海道","函館":"北海道","仙台":"宮城","那覇":"沖縄",
    "さいたま":"埼玉","浦和":"埼玉","大宮":"埼玉","川越":"埼玉",
    "神戸":"兵庫","金沢":"石川","福井市":"福井","草津":"滋賀",
    "高崎":"群馬","前橋":"群馬","宇都宮":"栃木","水戸":"茨城",
    "高松":"香川","松山":"愛媛","高知市":"高知","徳島市":"徳島",
    "北谷":"沖縄","宜野湾":"沖縄","浦添":"沖縄","読谷":"沖縄","恩納":"沖縄",
    "下北沢":"東京","渋谷":"東京","新宿":"東京","池袋":"東京","吉祥寺":"東京",
    "代々木":"東京","恵比寿":"東京","中目黒":"東京","三軒茶屋":"東京",
    "六本木":"東京","赤坂":"東京","銀座":"東京","秋葉原":"東京","上野":"東京",
    "浅草":"東京","品川":"東京","目黒":"東京","世田谷":"東京","杉並":"東京",
    "中野":"東京","練馬":"東京","板橋":"東京","豊島":"東京","荒川":"東京",
    "台東":"東京","墨田":"東京","江東":"東京","足立":"東京","葛飾":"東京",
    "江戸川":"東京","八王子":"東京","町田":"東京","府中":"東京","調布":"東京",
    "心斎橋":"大阪","難波":"大阪","梅田":"大阪","天王寺":"大阪","堺":"大阪",
    "天神":"福岡","博多":"福岡","小倉":"福岡"
  };

  function resolveArea(area){
    if(!area) return null;
    if(prefCoords[area]) return area;
    if(areaAlias[area]) return areaAlias[area];
    var keys=Object.keys(prefCoords);
    for(var i=0;i<keys.length;i++){
      if(area.indexOf(keys[i])!==-1) return keys[i];
    }
    return null;
  }

  function getCoords(s,idx,total){
    if(s.lat&&s.lng) return [s.lat,s.lng];
    var pref=resolveArea(s.area);
    if(!pref||!prefCoords[pref]) return null;
    var base=prefCoords[pref];
    var angle=(idx/Math.max(total,1))*Math.PI*2;
    var r=0.02+idx*0.005;
    return [base[0]+Math.sin(angle)*r, base[1]+Math.cos(angle)*r];
  }

  function scoreColor(score){
    if(!score||score===0) return '#999';
    if(score>=85) return '#e74c3c';
    if(score>=75) return '#e67e22';
    if(score>=65) return '#f1c40f';
    return '#27ae60';
  }

  // --- Init map ---
  var map=L.map('map',{zoomControl:false}).setView([36.5,137.5],6);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap',maxZoom:18
  }).addTo(map);

  // --- Add markers ---
  var allStores=window.stores||[];
  var markers=[];
  var prefCount={};

  // Count per pref
  allStores.forEach(function(s){
    var p=resolveArea(s.area);
    if(p) prefCount[p]=(prefCount[p]||0)+1;
  });

  allStores.forEach(function(s,i){
    var pref=resolveArea(s.area);
    var prefTotal=pref?prefCount[pref]:1;
    var prefIdx=0;
    for(var j=0;j<i;j++){
      if(resolveArea(allStores[j].area)===pref) prefIdx++;
    }
    var coords=getCoords(s,prefIdx,prefTotal);
    if(!coords) return;

    var color=scoreColor(s.score);
    var icon=L.divIcon({
      className:'',
      html:'<div style="width:12px;height:12px;background:'+color+';border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6]
    });

    var scoreHtml='';
    if(s.score&&s.score>0){
      scoreHtml='<span class="popup-score" style="background:'+color+'">'+s.score+'点</span>';
    }
    var addrHtml=s.address?'<div class="popup-addr">📍 '+s.address+'</div>':'';
    var hoursHtml=s.hours?'<div class="popup-hours">🕐 '+s.hours+(s.closed?' (定休:'+s.closed+')':'')+'</div>':'';
    var linkHtml='<a class="popup-link" href="/store?id='+s.id+'">詳細→</a>';

    var popup='<div class="popup-name">'+s.name+'</div>'
      +'<div class="popup-area">'+s.area+(s.neighborhood?' / '+s.neighborhood:'')+(s.style?' · '+s.style:'')+'</div>'
      +addrHtml+hoursHtml+scoreHtml+linkHtml;

    var m=L.marker(coords,{icon:icon}).bindPopup(popup);
    m._storeData=s;
    markers.push(m);
    m.addTo(map);
  });

  document.getElementById('storeCount').textContent='🌮 '+markers.length+'店舗';

  // --- Search ---
  var searchEl=document.getElementById('search');
  var debounce;
  searchEl.addEventListener('input',function(){
    clearTimeout(debounce);
    debounce=setTimeout(function(){
      var q=searchEl.value.trim().toLowerCase();
      var visible=0;
      markers.forEach(function(m){
        var s=m._storeData;
        var text=(s.name+' '+s.area+' '+(s.neighborhood||'')+' '+(s.address||'')+' '+(s.style||'')).toLowerCase();
        if(!q||text.indexOf(q)!==-1){
          if(!map.hasLayer(m)) m.addTo(map);
          visible++;
        } else {
          if(map.hasLayer(m)) map.removeLayer(m);
        }
      });
      document.getElementById('storeCount').textContent='🌮 '+visible+'店舗';
    },300);
  });
})();
</script>
</body>
</html>
