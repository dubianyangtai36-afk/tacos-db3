<style>

.store-count{background:linear-gradient(135deg,#ff6b35,#d32f2f);color:#fff;padding:8px 16px;border-radius:14px;font-size:14px;font-weight:800;text-align:center;box-shadow:0 4px 15px rgba(211,47,47,.4);letter-spacing:1px}

/* Search box */
.search-box{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:900;width:320px;max-width:calc(100% - 24px)}
.search-box input{width:100%;background:rgba(15,15,30,.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:10px 18px 10px 40px;font-size:13px;color:#fff;outline:none;transition:all .3s}

/* Legend */

/* Sidebar */

.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:16px 20px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}

.popup-content .p-link:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(52,232,158,.4)}

/* Cluster icons */
.marker-cluster-small{background:rgba(52,232,158,.3)}

.marker-cluster-medium{background:rgba(255,165,0,.3)}

.marker-cluster div{width:34px;height:34px;margin-left:3px;margin-top:3px;text-align:center;border-radius:50%;font:13px "Hiragino Kaku Gothic ProN",sans-serif;font-weight:800;color:#fff;line-height:34px}

@media(max-width:768px){
  .sidebar{width:100%}

}

<script>
(function(){
'use strict';

// === Prefecture coordinate lookup (all 47) ===
var prefCoords={
"北海道":[43.06,141.35],"青森":[40.82,140.74],"岩手":[39.70,141.15],"宮城":[38.27,140.87],
"秋田":[39.72,140.10],"山形":[38.24,140.33],"福島":[37.75,140.47],"茨城":[36.34,140.45],
"栃木":[36.57,139.88],"群馬":[36.39,139.06],"埼玉":[35.86,139.65],"千葉":[35.61,140.12],
"東京":[35.68,139.77],"神奈川":[35.45,139.64],"新潟":[37.90,139.02],"富山":[36.70,137.21],
"石川":[36.59,136.63],"福井":[36.07,136.22],"山梨":[35.66,138.57],"長野":[36.23,138.18],
"岐阜":[35.39,136.72],"静岡":[34.98,138.38],"愛知":[35.18,136.91],"三重":[34.73,136.51],
"滋賀":[35.00,135.87],"京都":[35.01,135.77],"大阪":[34.69,135.50],"兵庫":[34.69,135.18],
"奈良":[34.69,135.83],"和歌山":[34.23,135.17],"鳥取":[35.50,134.24],"島根":[35.47,133.05],
"岡山":[34.66,133.93],"広島":[34.40,132.46],"山口":[34.19,131.47],"徳島":[34.07,134.56],
"香川":[34.34,134.04],"愛媛":[33.84,132.77],"高知":[33.56,133.53],"福岡":[33.59,130.40],
"佐賀":[33.25,130.30],"長崎":[32.74,129.87],"熊本":[32.79,130.74],"大分":[33.24,131.61],
"宮崎":[31.91,131.42],"鹿児島":[31.56,130.56],"沖縄":[26.34,127.77]
};

// === Area name aliases (non-prefecture names → prefecture) ===
var areaAlias={
"名古屋":"愛知","横浜":"神奈川","川崎":"神奈川","鎌倉":"神奈川","藤沢":"神奈川","相模原":"神奈川",
"札幌":"北海道","函館":"北海道","旭川":"北海道","仙台":"宮城","那覇":"沖縄","さいたま":"埼玉",
"浦和":"埼玉","大宮":"埼玉","川越":"埼玉","船橋":"千葉","柏":"千葉","市川":"千葉",
"堺":"大阪","吹田":"大阪","豊中":"大阪","神戸":"兵庫","姫路":"兵庫","西宮":"兵庫",
"奈良市":"奈良","金沢":"石川","福井市":"福井","岐阜市":"岐阜","松本":"長野",
"浜松":"静岡","静岡市":"静岡","宇都宮":"栃木","前橋":"群馬","高崎":"群馬",
"水戸":"茨城","つくば":"茨城","長岡":"新潟","富山市":"富山","田府":"山梨",
"津":"三重","四日市":"三重","大津":"滋賀","宇治":"京都","和歌山市":"和歌山",
"鳥取市":"鳥取","松江":"島根","岡山市":"岡山","広島市":"広島","下関":"山口",
"徳島市":"徳島","高松":"香川","松山":"愛媛","高知市":"高知",
"北九州":"福岡","久留米":"福岡","佐賀市":"佐賀","長崎市":"長崎","熊本市":"熊本",
"大分市":"大分","宮崎市":"宮崎","鹿児島市":"鹿児島","青森市":"青森","弘前":"青森",
"盛岡":"岩手","秋田市":"秋田","山形市":"山形","郡山":"福島","いわき":"福島"
};

// Resolve area to a prefecture name
function resolveArea(area){
  if(prefCoords[area]) return area;
  if(areaAlias[area]) return areaAlias[area];
  // Try partial match
  var keys = Object.keys(prefCoords);
  for(var i=0;i<keys.length;i++){
    if(area && area.indexOf(keys[i])!==-1) return keys[i];
  }
  return null;
}

// === Score-based colors ===
function getScoreColor(score){
  if(!score||score===0) return '#78909c';
  if(score>=85) return '#ff1744';
  if(score>=75) return '#ff6d00';
  if(score>=65) return '#ffd600';
  return '#00e676';
}

function createTacoIcon(score){
  var color=getScoreColor(score);
  var size=score>=85?34:score>=75?30:28;
  return L.divIcon({
    className:'taco-marker',
    html:'<div style="background:'+color+';width:'+size+'px;height:'+size+'px;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);box-shadow:0 3px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:'+(size-12)+'px;cursor:pointer;transition:transform .2s">🌮</div>',
    iconSize:[size,size],
    iconAnchor:[size/2,size/2],
    popupAnchor:[0,-size/2-4]
  });
}

// === Map init with dark style ===
var map=L.map('map',{
  center:[36.2,137.5],
  zoom:6,
  zoomControl:false,
  attributionControl:true
});

L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd',
  maxZoom:19
}).addTo(map);

var clusterGroup = L.markerClusterGroup({
  maxClusterRadius:50,
  spiderfyOnMaxZoom:true,
  showCoverageOnHover:false,
  zoomToBoundsOnClick:true,
  iconCreateFunction:function(cluster){
    var count=cluster.getChildCount();
    var size=count>50?50:count>20?44:count>10?38:32;
    var cls=count>50?'large':count>20?'medium':'small';
    return L.divIcon({
      html:'<div>'+count+'</div>',
      className:'marker-cluster marker-cluster-'+cls,
      iconSize:L.point(size,size)
    });
  }
});
map.addLayer(clusterGroup);

var allMarkers=[];

function buildPopup(s){
  var html='<div class="popup-content">';
  html+='<div class="p-name">'+(s.emoji||'🌮')+' '+s.name+'</div>';
  html+='<div class="p-area">📍 '+s.area+(s.neighborhood?' / '+s.neighborhood:'')+'</div>';
  if(s.score) html+='<div class="p-row"><span class="p-score">★ '+s.score+'</span> <span style="font-size:11px;color:#aaa">('+s.reviews+'件)</span></div>';
  if(s.style) html+='<div class="p-row"><span class="p-label">ジャンル</span> '+s.style+'</div>';
  if(s.price) html+='<div class="p-row"><span class="p-label">価格帯</span> '+s.price+'</div>';
  if(s.hours) html+='<div class="p-row"><span class="p-label">営業</span> '+s.hours+'</div>';
  if(s.closed) html+='<div class="p-row"><span class="p-label">定休日</span> '+s.closed+'</div>';
  if(s.address) html+='<div class="p-row"><span class="p-label">住所</span> '+s.address+'</div>';
  html+='<a class="p-link" href="/store?id='+s.id+'">🌮 詳細を見る</a>';
  html+='</div>';
  return html;
}

function getStoreCoords(s,idx,total){
  // First check if store already has lat/lng from store-coords.js
  if(s.lat && s.lng) return [s.lat, s.lng];

  // Resolve area name to prefecture
  var pref = resolveArea(s.area);
  if(!pref) return null;

  var base = prefCoords[pref];
  if(!base) return null;

  // Spread markers in a spiral pattern to avoid overlap
  if(total<=1) return [base[0], base[1]];
  var angle = (idx / total) * Math.PI * 2 * 3;
  var r = 0.015 + idx * 0.012;
  return [base[0] + Math.sin(angle)*r, base[1] + Math.cos(angle)*r];
}

function plotStores(stores){
  clusterGroup.clearLayers();
  allMarkers=[];

  // Group by resolved prefecture for spiral positioning
  var byPref={};
  stores.forEach(function(s){
    var pref = resolveArea(s.area) || s.area;
    if(!byPref[pref]) byPref[pref]=[];
    byPref[pref].push(s);
  });

  var plotted=0;
  stores.forEach(function(s){
    var pref = resolveArea(s.area) || s.area;
    var group = byPref[pref]||[];
    var idx = group.indexOf(s);
    var coords = getStoreCoords(s, idx, group.length);
    if(!coords) return;

    var marker = L.marker(coords, {icon: createTacoIcon(s.score||0)});
    marker.bindPopup(buildPopup(s), {maxWidth:300, className:'taco-popup'});
    marker.storeData = s;
    clusterGroup.addLayer(marker);
    allMarkers.push(marker);
    plotted++;
  });

  document.getElementById('storeCount').textContent = '🌮 ' + plotted + '店舗';
  return plotted;
}

function getFilteredStores(stores){
  var area = document.getElementById('areaFilter').value;
  var style = document.getElementById('styleFilter').value;
  var price = document.getElementById('priceFilter').value;
  var search = (document.getElementById('searchInput').value||'').toLowerCase();

  return stores.filter(function(s){
    if(area && s.area !== area && resolveArea(s.area) !== area) return false;
    if(style && s.style !== style) return false;
    if(price && s.price !== price) return false;
    if(search){
      var text = (s.name+' '+s.area+' '+(s.neighborhood||'')+' '+(s.address||'')).toLowerCase();
      if(text.indexOf(search)===-1) return false;
    }
    return true;
  });
}

function openSidebar(title, stores){
  var sidebar=document.getElementById('sidebar');
  var content=document.getElementById('sidebarContent');
  document.getElementById('sidebarTitle').textContent=title+'（'+stores.length+'店舗）';
  var html='';
  stores.sort(function(a,b){return (b.score||0)-(a.score||0)});
  stores.forEach(function(s){
    html+='<div class="store-card" onclick="focusStore('+s.id+')">';
    html+='<div class="name">'+(s.emoji||'🌮')+' '+s.name+'</div>';
    html+='<div class="area">'+s.area+(s.neighborhood?' / '+s.neighborhood:'')+'</div>';
    html+='<div class="info">';
    if(s.score) html+='<b>★'+s.score+'</b> ';
    if(s.style) html+=s.style+' ';
    if(s.price) html+=s.price;
    html+='</div>';
    if(s.tags&&s.tags.length){
      html+='<div class="tags">';
      s.tags.slice(0,3).forEach(function(t){html+='<span class="tag">'+t+'</span>'});
      html+='</div>';
    }
    html+='</div>';
  });
  content.innerHTML=html;
  sidebar.classList.add('open');
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
}

function focusStore(id){
  for(var i=0;i<allMarkers.length;i++){
    if(allMarkers[i].storeData&&allMarkers[i].storeData.id===id){
      map.setView(allMarkers[i].getLatLng(),14,{animate:true});
      setTimeout(function(m){return function(){m.openPopup()}}(allMarkers[i]),300);
      break;
    }
  }
}
window.focusStore=focusStore;
window.closeSidebar=closeSidebar;

// Wait for store data to load
function waitForStores(cb){
  if(window.stores&&window.stores.length>50){cb(window.stores)}
  else{setTimeout(function(){waitForStores(cb)},150)}
}

waitForStores(function(stores){
  // Collect unique areas and styles
  var areas={};
  var styles={};
  stores.forEach(function(s){
    // Normalize: also count by resolved prefecture
    var pref = resolveArea(s.area);
    if(pref){
      areas[pref]=(areas[pref]||0)+1;
    } else {
      areas[s.area]=(areas[s.area]||0)+1;
    }
    if(s.style) styles[s.style]=(styles[s.style]||0)+1;
  });

  // Populate area filter with prefectures sorted by count
  var areaSelect=document.getElementById('areaFilter');
  Object.keys(areas).sort(function(a,b){return areas[b]-areas[a]}).forEach(function(a){
    var opt=document.createElement('option');
    opt.value=a;
    opt.textContent=a+'（'+areas[a]+'）';
    areaSelect.appendChild(opt);
  });

  var styleSelect=document.getElementById('styleFilter');
  Object.keys(styles).sort(function(a,b){return styles[b]-styles[a]}).forEach(function(s){
    var opt=document.createElement('option');
    opt.value=s;
    opt.textContent=s+'（'+styles[s]+'）';
    styleSelect.appendChild(opt);
  });

  function applyFilters(){
    var filtered=getFilteredStores(stores);
    plotStores(filtered);
    var area=document.getElementById('areaFilter').value;
    if(area){
      var coords=prefCoords[area];
      if(coords) map.setView(coords,10,{animate:true});
      openSidebar(area,filtered);
    } else {
      closeSidebar();
    }
  }

  document.getElementById('areaFilter').addEventListener('change',applyFilters);
  document.getElementById('styleFilter').addEventListener('change',applyFilters);
  document.getElementById('priceFilter').addEventListener('change',applyFilters);

  // Search with debounce
  var searchTimer;
  document.getElementById('searchInput').addEventListener('input',function(){
    clearTimeout(searchTimer);
    searchTimer=setTimeout(function(){
      var val=document.getElementById('searchInput').value;
      var filtered=getFilteredStores(stores);
      plotStores(filtered);
      if(val && filtered.length>0 && filtered.length<=20){
        openSidebar('検索結果', filtered);
        if(filtered.length===1){
          var pref=resolveArea(filtered[0].area);
          if(pref && prefCoords[pref]) map.setView(prefCoords[pref],12,{animate:true});
        }
      } else if(!val){
        closeSidebar();
      }
    },300);
  });

  // Initial plot
  var plotted = plotStores(stores);

  // Prefecture labels at low zoom
  var prefLabels=L.layerGroup();
  Object.keys(areas).forEach(function(pref){
    var coords=prefCoords[pref];
    if(!coords) return;
    var label=L.marker(coords,{
      icon:L.divIcon({
        className:'',
        html:'<div style="background:rgba(52,232,158,.85);color:#0f3443;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:800;white-space:nowrap;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.3);letter-spacing:.5px">'+pref+' '+areas[pref]+'</div>',
        iconSize:[90,22],
        iconAnchor:[45,11]
      }),
      interactive:true
    });
    label.on('click',function(){
      document.getElementById('areaFilter').value=pref;
      applyFilters();
    });
    label.addTo(prefLabels);
  });

  map.on('zoomend',function(){
    if(map.getZoom()<=7){
      if(!map.hasLayer(prefLabels)) prefLabels.addTo(map);
    } else {
      if(map.hasLayer(prefLabels)) map.removeLayer(prefLabels);
    }
  });
  prefLabels.addTo(map);

  console.log('Tacosco Map: '+plotted+' stores plotted out of '+stores.length+' total');
});

})();
</script>
</body>
</html>
